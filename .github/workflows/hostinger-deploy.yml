name: HostingerDeploy

on:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout code
      - uses: actions/checkout@v2

      # 2️⃣ Setup PHP
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, bcmath, intl, openssl, pdo_mysql, tokenizer
          ini-values: post_max_size=256M, upload_max_filesize=256M, memory_limit=512M

      # 3️⃣ Setup Node.js (Vite requires Node 22+)
      - uses: actions/setup-node@v3
        with:
          node-version: 22

      # 4️⃣ Copy .env
      - name: Copy .env
        run: cp .env.example .env

      # 5️⃣ Install Composer dependencies
      - name: Install Composer Dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      # 6️⃣ Install Node dependencies
      - name: Install Node dependencies
        run: npm ci

      # 7️⃣ Build Vite assets
      - name: Build Frontend Assets
        run: npm run build

      # 8️⃣ Run Laravel migrations
      - name: Run Migrations
        run: php artisan migrate --force

      # 9️⃣ Setup SSH (for Hostinger deployment)
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh/
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -t rsa -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      # 🔟 Deploy PHP & Laravel files to Hostinger
      - name: Deploy PHP to Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          port: ${{ secrets.SSH_PORT }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd ~/domains/lightgreen-grasshopper-124971.hostingersite.com
            git pull
            composer install --no-interaction --optimize-autoloader
            php artisan migrate --force

      # 1️⃣1️⃣ Sync built assets
      - name: Copy Build Files to Target Server
        run: |
          rsync -avz -e "ssh -p ${{ secrets.SSH_PORT }}" \
          ${{ github.workspace }}/public/build/ \
          ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }}:~/domains/lightgreen-grasshopper-124971.hostingersite.com/public/build
